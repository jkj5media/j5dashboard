<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="j5-icon-512px.png">
  <title>J5 DASHBOARD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050816;
      --bg-elevated: #0b1020;
      --card: #111827;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.2);
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #fbbf24;
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.65);
      --radius-lg: 18px;
      --radius-pill: 999px;
      --transition-fast: 0.18s ease-out;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #1f2937 0, #020617 55%, #000 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .app-shell {
      width: 100%;
      max-width: 1200px;
      margin: 16px;
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.97), rgba(8, 25, 55, 0.96));
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: conic-gradient(from 210deg, #3b82f6, #22c55e, #a855f7, #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(59, 130, 246, 0.5);
      position: relative;
      overflow: hidden;
    }

    .brand-logo::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 12px;
      background: radial-gradient(circle at 20% 0, rgba(248, 250, 252, 0.45), transparent 60%);
      mix-blend-mode: screen;
      opacity: 0.85;
    }

    .brand-icon {
      position: relative;
      z-index: 1;
      font-size: 22px;
    }

    .brand-text h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .brand-text span {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      background: rgba(15, 23, 42, 0.8);
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .pill-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.25);
    }

    .btn-refresh {
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #e5f2ff;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.55);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), filter var(--transition-fast);
    }

    .btn-refresh:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
      box-shadow: 0 16px 38px rgba(37, 99, 235, 0.7);
    }

    .btn-refresh:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.9);
    }

    .btn-icon {
      font-size: 1rem;
    }

    .timestamp {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .layout-main {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    @media (max-width: 960px) {
      main {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .app-shell {
        margin: 0;
        border-radius: 0;
        min-height: 100vh;
      }

      main {
        grid-template-columns: 1fr;
      }

      header {
        align-items: flex-start;
      }
    }

    .card {
      background: radial-gradient(circle at top left, rgba(51, 65, 85, 0.4) 0, rgba(15, 23, 42, 0.96) 35%, rgba(15, 23, 42, 1) 100%);
      border-radius: var(--radius-lg);
      padding: 16px 16px 14px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.85);
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 260px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: radial-gradient(circle at 10% -10%, rgba(59, 130, 246, 0.22), transparent 55%);
      opacity: 0.9;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -40%;
      background: radial-gradient(circle at 120% 120%, rgba(236, 72, 153, 0.16), transparent 55%);
      opacity: 0.8;
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .location-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .location-name {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .location-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .badge-zip {
      align-self: flex-start;
      margin-top: 4px;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.4);
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.3);
      font-size: 0.7rem;
      color: var(--text-muted);
      backdrop-filter: blur(10px);
    }

    .status-chip-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
    }

    .temp-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 6px;
    }

    .temp-main {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .temp-main-value {
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1;
    }

    .temp-main-unit {
      font-size: 0.9rem;
      color: var(--text-muted);
      transform: translateY(2px);
    }

    .temp-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .condition-text {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .hi-lo {
      display: flex;
      gap: 8px;
      font-size: 0.8rem;
    }

    .hi-chip,
    .lo-chip {
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      font-weight: 500;
    }

    .hi-chip {
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
    }

    .lo-chip {
      background: rgba(56, 189, 248, 0.12);
      color: #bae6fd;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      margin-top: 6px;
    }

    .metric {
      flex: 1;
      padding: 6px 8px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.25);
      font-size: 0.73rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
      color: var(--text-muted);
    }

    .metric-label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .metric-value {
      font-size: 0.9rem;
      color: var(--text-main);
      font-weight: 500;
    }

    .precip-good {
      color: var(--success);
    }

    .precip-medium {
      color: var(--warning);
    }

    .precip-high {
      color: var(--danger);
    }

    /* 3-day outlook */
    .outlook-wrapper {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid rgba(31, 41, 55, 0.9);
    }

    .outlook-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .outlook-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .outlook-day {
      padding: 6px 8px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.28);
      font-size: 0.7rem;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .outlook-day-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .outlook-temps {
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      gap: 4px;
    }

    .outlook-hi {
      color: #fecaca;
    }

    .outlook-lo {
      color: #bae6fd;
    }

    .outlook-precip {
      font-size: 0.74rem;
      color: var(--text-muted);
    }

    .footer-row {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      gap: 6px;
    }

    .api-source {
      opacity: 0.75;
    }

    .error,
    .loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 0.8rem;
      padding: 10px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px dashed rgba(248, 250, 252, 0.2);
      color: var(--text-muted);
    }

    .error {
      border-color: rgba(248, 113, 113, 0.7);
      color: #fecaca;
    }

    .skeleton {
      background: linear-gradient(
        90deg,
        rgba(148, 163, 184, 0.1) 0%,
        rgba(148, 163, 184, 0.28) 20%,
        rgba(148, 163, 184, 0.08) 40%,
        rgba(148, 163, 184, 0.08) 100%
      );
      background-size: 400% 100%;
      animation: shimmer 1.1s ease-in-out infinite;
      border-radius: 999px;
      height: 12px;
      width: 65%;
    }

    @keyframes shimmer {
      0% {
        background-position: -100% 0;
      }
      100% {
        background-position: 140% 0;
      }
    }

    /* News section (TheNewsAPI) */
    .news-card {
      margin-top: 4px;
      background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.45) 0, rgba(17, 24, 39, 0.96) 40%, rgba(15, 23, 42, 1) 100%);
      border-radius: 20px;
      border: 1px solid rgba(129, 140, 248, 0.4);
      padding: 14px 16px 12px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.95);
    }

    .news-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .news-title {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .news-badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(191, 219, 254, 0.7);
      background: rgba(15, 23, 42, 0.9);
      color: #bfdbfe;
    }

    .news-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 260px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.7) transparent;
    }

    .news-list::-webkit-scrollbar {
      width: 5px;
    }

    .news-list::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.7);
      border-radius: 999px;
    }

    .news-item {
      padding: 6px 0;
      border-bottom: 1px solid rgba(31, 41, 55, 0.8);
      font-size: 0.78rem;
    }

    .news-item:last-child {
      border-bottom: none;
    }

    .news-source-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 2px;
      color: var(--text-muted);
      font-size: 0.7rem;
    }

    .news-source {
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .news-time {
      opacity: 0.8;
    }

    .news-title-link {
      color: var(--text-main);
      text-decoration: none;
    }

    .news-title-link:hover {
      text-decoration: underline;
    }

    .news-desc {
      margin-top: 2px;
      font-size: 0.74rem;
      color: var(--text-muted);
    }

    .news-footer {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    footer {
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
      border-top: 1px solid rgba(31, 41, 55, 0.85);
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="brand">
        <div class="brand-logo">
          <span class="brand-icon">☁️</span>
        </div>
        <div class="brand-text">
          <h1>Coastal Nowcast</h1>
          <span>Weather & top stories</span>
        </div>
      </div>
      <div class="toolbar">
        <div class="pill">
          <span class="pill-dot"></span>
          <span id="status-text">Live weather</span>
        </div>
        <button class="btn-refresh" id="refresh-btn">
          <span class="btn-icon">↻</span>
          <span>Refresh</span>
        </button>
        <span class="timestamp" id="last-updated">—</span>
      </div>
    </header>

    <div class="layout-main">
      <main id="cards-container">
        <!-- Weather cards injected here -->
      </main>

      <!-- News section -->
      <section class="news-card" id="news-card">
        <div class="news-header">
          <div class="news-title">Top stories (US)</div>
          <div class="news-badge">TheNewsAPI.com</div>
        </div>
        <div id="news-body">
          <div class="loading">Loading top stories…</div>
        </div>
      </section>
    </div>

    <footer>
      <span>Weather: WeatherAPI.com forecast (current + 3‑day)</span>
      <span>News: TheNewsAPI.com /v1/news/top</span>
    </footer>
  </div>

  <script>
    // === CONFIG: WeatherAPI ===
    const WEATHERAPI_KEY = "a75bd86e2de24c3781a131930261102";
    const WEATHERAPI_BASE = "https://api.weatherapi.com/v1";
    const USE_HTTPS_PROXY = false;
    const PROXY_BASE = "";

    const LOCATIONS = [
      { zip: "29910", label: "Bluffton", state: "SC" },
      { zip: "29926", label: "Hilton Head Island", state: "SC" },
      { zip: "31402", label: "Savannah", state: "GA" }
    ];

    function weatherApiForecastUrl(zip) {
      const q = encodeURIComponent(zip);
      const url = `${WEATHERAPI_BASE}/forecast.json?key=${encodeURIComponent(
        WEATHERAPI_KEY
      )}&q=${q}&days=3&aqi=no&alerts=no`; // 3-day forecast + current.[web:31][web:56]
      if (!USE_HTTPS_PROXY || !PROXY_BASE) return url;
      return PROXY_BASE + encodeURIComponent(url);
    }

    function formatTime(dt = new Date()) {
      return dt.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function classifyPrecip(prob) {
      if (prob == null) return "";
      if (prob < 20) return "precip-good";
      if (prob < 50) return "precip-medium";
      return "precip-high";
    }

    function createSkeletonCard(location) {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <div class="card-inner" data-zip="${location.zip}">
          <div class="card-header">
            <div class="location-meta">
              <div class="location-name">${location.label}</div>
              <div class="location-subtitle">ZIP ${location.zip} · ${location.state}</div>
              <div class="badge-zip">Loading...</div>
            </div>
            <div class="status-chip">
              <span class="status-chip-dot"></span>
              <span>Fetching</span>
            </div>
          </div>
          <div class="temp-row">
            <div class="temp-main">
              <div class="temp-main-value skeleton"></div>
            </div>
            <div class="temp-meta">
              <div class="condition-text skeleton"></div>
              <div class="hi-lo">
                <div class="hi-chip skeleton" style="width: 60px;"></div>
                <div class="lo-chip skeleton" style="width: 60px;"></div>
              </div>
            </div>
          </div>
          <div class="metric-row">
            <div class="metric">
              <span class="metric-label">Precip today</span>
              <span class="metric-value skeleton"></span>
            </div>
            <div class="metric">
              <span class="metric-label">Feels like</span>
              <span class="metric-value skeleton"></span>
            </div>
          </div>
          <div class="outlook-wrapper">
            <div class="outlook-title">
              <span>3‑Day outlook</span>
              <span style="font-size:0.7rem;color:#6b7280;">Hi · Lo · Precip%</span>
            </div>
            <div class="outlook-grid">
              <div class="outlook-day skeleton"></div>
              <div class="outlook-day skeleton"></div>
              <div class="outlook-day skeleton"></div>
            </div>
          </div>
          <div class="footer-row">
            <span>Updated —</span>
            <span class="api-source">WeatherAPI.com</span>
          </div>
        </div>
      `;
      return card;
    }

    function renderError(cardEl, msg) {
      cardEl.innerHTML = `
        <div class="card-inner">
          <div class="card-header">
            <div class="location-meta">
              <div class="location-name">Error</div>
              <div class="location-subtitle">Unable to load data</div>
            </div>
          </div>
          <div class="error">${msg}</div>
        </div>
      `;
    }

    function buildThreeDayOutlook(forecastdays) {
      if (!Array.isArray(forecastdays) || forecastdays.length === 0) {
        return "<div>No forecast data.</div>";
      }
      const days = forecastdays.slice(0, 3);
      return days
        .map((fd, idx) => {
          const dateStr = fd.date;
          const dayObj = fd.day || {};
          const labelDate = dateStr ? new Date(dateStr) : null;
          const label =
            idx === 0
              ? "Today"
              : labelDate
              ? labelDate.toLocaleDateString([], { weekday: "short" })
              : `Day ${idx + 1}`;

          const hiF =
            dayObj.maxtemp_f != null ? Math.round(dayObj.maxtemp_f) : "—";
          const loF =
            dayObj.mintemp_f != null ? Math.round(dayObj.mintemp_f) : "—";
          const precipProb =
            dayObj.daily_chance_of_rain != null
              ? dayObj.daily_chance_of_rain
              : null; // daily chance of rain %.[web:56]
          const precipClass = classifyPrecip(precipProb);

          return `
            <div class="outlook-day">
              <div class="outlook-day-label">${label}</div>
              <div class="outlook-temps">
                <span class="outlook-hi">${hiF !== "—" ? hiF + "°" : "—"}</span>
                <span class="outlook-lo">${loF !== "—" ? loF + "°" : "—"}</span>
              </div>
              <div class="outlook-precip ${precipClass}">
                ${precipProb != null ? precipProb + "% rain" : "Precip —"}
              </div>
            </div>
          `;
        })
        .join("");
    }

    function renderWeatherCard(container, location, data) {
      const now = new Date();
      const loc = data.location || {};
      const current = data.current || {};
      const forecast = data.forecast || {};
      const forecastdays = forecast.forecastday || [];

      const today = forecastdays[0] || null;
      const todayDay = today?.day || null;

      const cityName = loc.name || location.label || `ZIP ${location.zip}`;
      const region = loc.region || location.state || "";
      const dateStr = today?.date || now.toISOString().slice(0, 10);

      const tempF = current.temp_f != null ? current.temp_f : "—";
      const conditionText = current.condition?.text || "Unavailable";
      const feelsLikeF =
        current.feelslike_f != null ? current.feelslike_f : null;
      const updatedEpoch = current.last_updated_epoch
        ? new Date(current.last_updated_epoch * 1000)
        : now;

      const hiF =
        todayDay?.maxtemp_f != null ? todayDay.maxtemp_f : "—";
      const loF =
        todayDay?.mintemp_f != null ? todayDay.mintemp_f : "—";
      const precipProb =
        todayDay?.daily_chance_of_rain != null
          ? todayDay.daily_chance_of_rain
          : null;

      const precipClass = classifyPrecip(precipProb);
      const outlookHtml = buildThreeDayOutlook(forecastdays);

      container.innerHTML = `
        <div class="card-inner">
          <div class="card-header">
            <div class="location-meta">
              <div class="location-name">${cityName}</div>
              <div class="location-subtitle">
                ZIP ${location.zip} · ${region}
              </div>
              <div class="badge-zip">
                Today · ${new Date(dateStr).toLocaleDateString([], {
                  month: "short",
                  day: "numeric"
                })}
              </div>
            </div>
            <div class="status-chip">
              <span class="status-chip-dot"></span>
              <span>Live</span>
            </div>
          </div>

          <div class="temp-row">
            <div class="temp-main">
              <div class="temp-main-value">${
                tempF !== "—" ? Math.round(tempF) : "—"
              }</div>
              <div class="temp-main-unit">°F</div>
            </div>
            <div class="temp-meta">
              <div class="condition-text">${conditionText}</div>
              <div class="hi-lo">
                <div class="hi-chip">H: ${
                  hiF !== "—" ? Math.round(hiF) + "°" : "—"
                }</div>
                <div class="lo-chip">L: ${
                  loF !== "—" ? Math.round(loF) + "°" : "—"
                }</div>
              </div>
            </div>
          </div>

          <div class="metric-row">
            <div class="metric">
              <span class="metric-label">Precip today</span>
              <span class="metric-value ${precipClass}">
                ${precipProb != null ? precipProb + "%" : "—"}
              </span>
            </div>
            <div class="metric">
              <span class="metric-label">Feels like</span>
              <span class="metric-value">
                ${
                  feelsLikeF != null ? Math.round(feelsLikeF) + "°F" : "—"
                }
              </span>
            </div>
          </div>

          <div class="outlook-wrapper">
            <div class="outlook-title">
              <span>3‑Day outlook</span>
              <span style="font-size:0.7rem;color:#6b7280;">Hi · Lo · Precip%</span>
            </div>
            <div class="outlook-grid">
              ${outlookHtml}
            </div>
          </div>

          <div class="footer-row">
            <span>Updated ${updatedEpoch.toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit"
            })}</span>
            <span class="api-source">WeatherAPI.com · current + 3‑day</span>
          </div>
        </div>
      `;
    }

    async function fetchWeatherForZip(zip) {
      const url = weatherApiForecastUrl(zip);
      const resp = await fetch(url);
      if (!resp.ok) {
        throw new Error("Request failed: " + resp.status);
      }
      const data = await resp.json();
      if (!data || !data.location || !data.current || !data.forecast) {
        throw new Error("Incomplete weather data.");
      }
      return data;
    }

    async function loadAllWeather() {
      const container = document.getElementById("cards-container");
      const statusText = document.getElementById("status-text");
      const lastUpdated = document.getElementById("last-updated");

      statusText.textContent = "Refreshing…";
      lastUpdated.textContent = "Updating…";

      container.innerHTML = "";
      const cardElements = {};

      LOCATIONS.forEach((loc) => {
        const card = createSkeletonCard(loc);
        container.appendChild(card);
        cardElements[loc.zip] = card;
      });

      const started = new Date();

      const tasks = LOCATIONS.map(async (loc) => {
        const card = cardElements[loc.zip];

        try {
          const data = await fetchWeatherForZip(loc.zip);
          renderWeatherCard(card, loc, data);
        } catch (err) {
          console.error("Weather load error", loc.zip, err);
          renderError(card, err.message || "Unable to load weather for this ZIP.");
        }
      });

      await Promise.allSettled(tasks);

      statusText.textContent = "Live weather";
      lastUpdated.textContent = `Updated ${formatTime(started)}`;
    }

    // === CONFIG: TheNewsAPI ===
    const THENEWSAPI_KEY = "gwHY1qxrLYftHa0aYJ2COoCefo0pjYWs83Nkdk1s";
    const THENEWSAPI_BASE = "https://api.thenewsapi.com/v1";

    function newsTopStoriesUrl() {
      // Top stories endpoint; filter to US, English, and limit to 5 articles.[web:97]
      const params = new URLSearchParams({
        api_token: THENEWSAPI_KEY,
        locale: "us",
        language: "en",
        limit: "5"
      });
      return `${THENEWSAPI_BASE}/news/top?${params.toString()}`;
    }

    function renderNewsError(msg) {
      const body = document.getElementById("news-body");
      body.innerHTML = `<div class="error">${msg}</div>`;
    }

    function renderNewsLoading() {
      const body = document.getElementById("news-body");
      body.innerHTML = `<div class="loading">Loading top stories…</div>`;
    }

    function renderNews(dataArray) {
      const body = document.getElementById("news-body");
      if (!Array.isArray(dataArray) || dataArray.length === 0) {
        body.innerHTML = `<div class="loading">No stories available right now.</div>`;
        return;
      }

      const itemsHtml = dataArray
        .map((a) => {
          const title = a.title || "Untitled";
          const url = a.url || "#";
          const desc = a.description || a.snippet || "";
          const source = a.source || "Unknown";
          const published = a.published_at ? new Date(a.published_at) : null; // ISO timestamp in UTC.[web:97]
          const timeLabel = published
            ? published.toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
              })
            : "";

          return `
            <article class="news-item">
              <div class="news-source-row">
                <span class="news-source">${source}</span>
                <span class="news-time">${timeLabel}</span>
              </div>
              <a class="news-title-link" href="${url}" target="_blank" rel="noopener noreferrer">
                ${title}
              </a>
              ${
                desc
                  ? `<div class="news-desc">${desc}</div>`
                  : ""
              }
            </article>
          `;
        })
        .join("");

      body.innerHTML = `
        <div class="news-list">
          ${itemsHtml}
        </div>
        <div class="news-footer">
          <span>Powered by TheNewsAPI.com</span>
          <span>Endpoint: /v1/news/top</span>
        </div>
      `;
    }

    async function loadNews() {
      renderNewsLoading();
      try {
        const url = newsTopStoriesUrl();
        const resp = await fetch(url);
        if (!resp.ok) {
          throw new Error("News request failed: " + resp.status);
        }
        const data = await resp.json();
        // TheNewsAPI returns top stories in data.data array.[web:97]
        const articles = Array.isArray(data.data) ? data.data : [];
        renderNews(articles);
      } catch (err) {
        console.error("News load error", err);
        renderNewsError(err.message || "Unable to load stories.");
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const refreshBtn = document.getElementById("refresh-btn");
      refreshBtn.addEventListener("click", () => {
        loadAllWeather();
        loadNews();
      });

      loadAllWeather();
      loadNews();

      // Auto-refresh every 10 minutes (weather + news)
      setInterval(() => {
        loadAllWeather();
        loadNews();
      }, 10 * 60 * 1000);
    });
  </script>
</body>
</html>
